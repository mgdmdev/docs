            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /api/organizations/{id}:
    get:
      operationId: getOrganization
      tags: [Organizations]
      summary: Get an organization
      description: Retrieve organization details by ID.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Organization details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /api/organizations/{id}/members:
    post:
      operationId: addOrgMember
      tags: [Organizations]
      summary: Add a member to an organization
      description: Add a user to an organization with an organization-scoped role.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  type: string
                  example: usr_abc123
                role_id:
                  type: string
                  example: role_org_admin
      responses:
        "200":
          description: Member added
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true

  # ──── Audit Logs (Admin) ────
  /api/audit:
    get:
      operationId: listAuditLogs
      tags: [Audit Logs]
      summary: List audit log entries
      description: Query paginated audit log entries with optional filters.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
        - name: user_id
          in: query
          description: Filter by actor user ID
          schema:
            type: string
        - name: event_type
          in: query
          description: Filter by event type
          schema:
            type: string
        - name: from
          in: query
          description: Unix timestamp lower bound
          schema:
            type: integer
        - name: to
          in: query
          description: Unix timestamp upper bound
          schema:
            type: integer
      responses:
        "200":
          description: Paginated audit log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditLogEntry"
                  total:
                    type: integer
                  page:
                    type: integer

  # ──── Admin - Manual Operations ────
  /api/rewards/credit:
    post:
      operationId: manualCredit
      tags: [Admin - Ledger]
      summary: Manually credit points to a user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, points]
              properties:
                user_id:
                  type: string
                points:
                  type: integer
                  minimum: 1
                event_type:
                  type: string
                  default: admin_credit
                metadata:
                  type: object
      responses:
        "200":
          description: Points credited

  /api/rewards/reconcile/{userId}:
    post:
      operationId: reconcileUser
      tags: [Admin - Ledger]
      summary: Reconcile a user's balance from ledger
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reconciliation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  cached:
                    type: integer
                  calculated:
                    type: integer
                  drift:
                    type: integer
                  fixed:
                    type: boolean

components:
  securitySchemes:
    apiKey:
      type: apiKey
      name: X-API-Key
      in: header
      description: Partner API key issued during onboarding
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: OAuth 2.0 access token from mgPass

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

    LedgerEntry:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        event_type:
          type: string
        platform:
          type: string
        points:
          type: integer
          description: Positive = earned, negative = redeemed
        rule_version:
          type: string
        reference_id:
          type: string
          nullable: true
        metadata:
          type: string
          nullable: true
        created_at:
          type: integer
          description: Unix timestamp

    Redemption:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        reward_id:
          type: string
          nullable: true
        points_cost:
          type: integer
        status:
          type: string
          enum: [pending, processing, completed, failed, cancelled]
        redemption_type:
          type: string
          enum: [catalog, cashback]
        cashback_amount:
          type: number
          nullable: true
        phone_number:
          type: string
          nullable: true
        network:
          type: string
          nullable: true
        created_at:
          type: integer
        updated_at:
          type: integer

    CashbackResult:
      type: object
      properties:
        redemption_id:
          type: string
        status:
          type: string
          example: pending
        points:
          type: integer
        tier:
          type: string
        rate:
          type: number
        gross_amount:
          type: number
        fee_rate:
          type: number
        fee_amount:
          type: number
        net_amount:
          type: number

    PointsRule:
      type: object
      properties:
        id:
          type: string
        platform:
          type: string
          nullable: true
        event_type:
          type: string
        tier:
          type: string
          nullable: true
        points:
          type: integer
        points_type:
          type: string
          enum: [flat, per_unit]
        unit_field:
          type: string
          nullable: true
        daily_cap:
          type: integer
          nullable: true
        monthly_cap:
          type: integer
          nullable: true
        frequency:
          type: string
          enum: [once, daily, weekly, monthly, unlimited]
        is_active:
          type: integer
        version:
          type: string
          nullable: true
        created_at:
          type: integer

    PointsRuleInput:
      type: object
      required: [event_type, points]
      properties:
        platform:
          type: string
        event_type:
          type: string
        tier:
          type: string
          nullable: true
        points:
          type: integer
          minimum: 0
        points_type:
          type: string
          enum: [flat, per_unit]
          default: flat
        unit_field:
          type: string
        daily_cap:
          type: integer
        monthly_cap:
          type: integer
        frequency:
          type: string
          enum: [once, daily, weekly, monthly, unlimited]
        is_active:
          type: boolean
          default: true
        version:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
          example: usr_abc123def456
        email:
          type: string
          format: email
          example: kwame@example.com
        name:
          type: string
          example: Kwame Asante
        phone:
          type: string
          example: "+233241234567"
        avatar:
          type: string
          nullable: true
        gender:
          type: string
          nullable: true
        date_of_birth:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        is_suspended:
          type: boolean
          example: false
        created_at:
          type: integer
          example: 1711900000
        updated_at:
          type: integer
          example: 1711900000

    UserInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: kwame@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: SecureP@ssw0rd
        name:
          type: string
          example: Kwame Asante
        phone:
          type: string
          example: "+233241234567"

    OAuthClient:
      type: object
      properties:
        id:
          type: string
          example: app_abc123
        name:
          type: string
          example: adesa+ Web
        type:
          type: string
          enum: [traditional_web, spa, native, machine_to_machine]
          example: traditional_web
        client_id:
          type: string
          example: app_abc123
        redirect_uris:
          type: array
          items:
            type: string
          example: ["https://adesa.plus/callback"]
        post_logout_redirect_uris:
          type: array
          items:
            type: string
        allowed_scopes:
          type: array
          items:
            type: string
          example: ["openid", "profile", "email"]
        cors_origins:
          type: array
          items:
            type: string
        access_token_ttl:
          type: integer
          example: 3600
        refresh_token_ttl:
          type: integer
          example: 2592000
        logo_uri:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        created_at:
          type: integer

    ClientInput:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
          example: adesa+ Web
        type:
          type: string
          enum: [traditional_web, spa, native, machine_to_machine]
        redirect_uris:
          type: array
          items:
            type: string
        post_logout_redirect_uris:
          type: array
          items:
            type: string
        allowed_scopes:
          type: array
          items:
            type: string
        cors_origins:
          type: array
          items:
            type: string
        access_token_ttl:
          type: integer
          default: 3600
        refresh_token_ttl:
          type: integer
          default: 2592000
        logo_uri:
          type: string
        description:
          type: string

    Role:
      type: object
      properties:
        id:
          type: string
          example: role_subscriber
        name:
          type: string
          example: subscriber
        description:
          type: string
          example: adesa+ subscriber with streaming access
        is_default:
          type: boolean
          example: false
        type:
          type: string
          enum: [user, machine_to_machine]
          example: user
        created_at:
          type: integer

    RoleInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: subscriber
        description:
          type: string
        is_default:
          type: boolean
          default: false
        type:
          type: string
          enum: [user, machine_to_machine]
          default: user
        scope_ids:
          type: array
          items:
            type: string
          description: IDs of scopes to include in this role

    ApiResource:
      type: object
      properties:
        id:
          type: string
          example: res_abc123
        name:
          type: string
          example: adesa+ Streaming API
        indicator:
          type: string
          example: https://api.adesa.plus
        is_default:
          type: boolean
          example: false
        created_at:
          type: integer

    Scope:
      type: object
      properties:
        id:
          type: string
          example: scope_stream_live
        name:
          type: string
          example: stream:live
        description:
          type: string
          example: Access live streams
        resource_id:
          type: string
        created_at:
          type: integer

    Organization:
      type: object
      properties:
        id:
          type: string
          example: org_abc123
        name:
          type: string
          example: TV3 Network
        description:
          type: string
          nullable: true
          example: TV3 broadcast partner
        created_at:
          type: integer

    AuditLogEntry:
      type: object
      properties:
        id:
          type: string
          example: aud_abc123
        event_type:
          type: string
          example: user.login.success
        actor_id:
          type: string
          example: usr_abc123
        actor_email:
          type: string
          example: kwame@example.com
        target_type:
          type: string
          example: user
        target_id:
          type: string
          example: usr_abc123
        ip_address:
          type: string
        user_agent:
          type: string
        metadata:
          type: object
          nullable: true
        created_at:
          type: integer

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
          example: eyJhbGciOiJSUzI1NiIs...
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 3600
        refresh_token:
          type: string
          nullable: true
          example: rt_abc123...
        id_token:
          type: string
          nullable: true
          example: eyJhbGciOiJSUzI1NiIs...
        scope:
          type: string
          example: openid profile email

    OIDCDiscovery:
      type: object
      properties:
        issuer:
          type: string
          example: https://pass.mediageneral.digital
        authorization_endpoint:
          type: string
          example: https://pass.mediageneral.digital/oidc/auth
        token_endpoint:
          type: string
          example: https://pass.mediageneral.digital/api/token
        userinfo_endpoint:
          type: string
          example: https://pass.mediageneral.digital/oidc/userinfo
        jwks_uri:
          type: string
          example: https://pass.mediageneral.digital/.well-known/jwks.json
        scopes_supported:
          type: array
          items:
            type: string
          example: [openid, profile, email, phone, offline_access]
        response_types_supported:
          type: array
          items:
            type: string
          example: [code]
        grant_types_supported:
          type: array
          items:
            type: string
          example: [authorization_code, refresh_token, client_credentials]
        subject_types_supported:
          type: array
          items:
            type: string
          example: [public]
        id_token_signing_alg_values_supported:
          type: array
          items:
            type: string
          example: [RS256]
        code_challenge_methods_supported:
          type: array
          items:
            type: string
          example: [S256]

    Benefit:
      type: object
      properties:
        id:
          type: string
          example: ben_abc123
        name:
          type: string
          example: Priority Support
        description:
          type: string
          example: Access to priority customer support channel
        icon:
          type: string
          nullable: true
          example: star
        is_active:
          type: boolean
          example: true
        created_at:
          type: integer
        updated_at:
          type: integer

    BenefitInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Priority Support
        description:
          type: string
          example: Access to priority customer support channel
        icon:
          type: string
        is_active:
          type: boolean
          default: true

    TemplateRow:
      type: object
      properties:
        id:
          type: string
          example: tpl_welcome
        name:
          type: string
          example: Welcome Email
        channel:
          type: string
          enum: [email, sms]
          example: email
        subject:
          type: string
          example: "Welcome to mgPass, {{name}}!"
        body:
          type: string
          example: "Hi {{name}}, your account is ready."
        is_active:
          type: boolean
          example: true
        created_at:
          type: integer
        updated_at:
          type: integer

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: rate_limit_exceeded
              error_description:
                type: string
